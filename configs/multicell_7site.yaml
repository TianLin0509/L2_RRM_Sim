## L2 RRM 仿真 — 多小区配置 (7站21小区)

sim:
  num_slots: 3000
  random_seed: 42
  warmup_slots: 500
  kpi_trim_percent: 5.0

carrier:
  subcarrier_spacing: 30
  num_prb: 273
  bandwidth_mhz: 100.0
  carrier_freq_ghz: 3.5
  num_pdcch_symbols: 2
  dmrs_type: 1
  dmrs_cdm_groups: 2
  num_dmrs_symbols: 1

cell:
  num_tx_ant: 64
  num_tx_ports: 4
  max_layers: 4
  total_power_dbm: 46.0
  cell_radius_m: 250.0
  height_m: 25.0
  scenario: uma
  noise_figure_db: 5.0

ue:
  num_ue: 10           # 每小区 UE 数
  num_rx_ant: 4
  min_distance_m: 35.0
  max_distance_m: 250.0
  height_m: 1.5
  speed_kmh: 3.0

scheduler:
  type: pf
  beta: 0.98

link_adaptation:
  bler_target: 0.1
  olla_delta_up: 1.0
  olla_offset_min: -20.0
  olla_offset_max: 20.0
  mcs_table_index: 1

traffic:
  type: full_buffer

channel:
  type: statistical
  scenario: uma
  shadow_fading_std_db: 4.0

# 多小区特有配置
multicell:
  num_rings: 1           # 1环 = 7站 × 3扇区 = 21小区
  ici_load_factor: 0.8   # 邻小区 80% 负载
